name: Azure ASR RPO Monitor

on:
  schedule:
    # Runs every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  monitor-asr:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------
      # Checkout Repository
      # ---------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # Setup Python
      # ---------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---------------------------------------------------
      # Install Dependencies
      # ---------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------------------------------------------
      # Run ASR Monitoring Script
      # ---------------------------------------------------
      - name: Run Azure ASR Monitoring
        env:
          ASR_TENANT_ID: ${{ secrets.ASR_TENANT_ID }}
          ASR_CLIENT_ID: ${{ secrets.ASR_CLIENT_ID }}
          ASR_CLIENT_SECRET: ${{ secrets.ASR_CLIENT_SECRET }}

          MAIL_TENANT_ID: ${{ secrets.MAIL_TENANT_ID }}
          MAIL_CLIENT_ID: ${{ secrets.MAIL_CLIENT_ID }}
          MAIL_CLIENT_SECRET: ${{ secrets.MAIL_CLIENT_SECRET }}

        run: |
          python asr_rpo_monitor.py
